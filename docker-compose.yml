version: '3.8'

services:
  # 1. Primary Database - Transaction Records
  postgres:
    image: postgres:15
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d sentinel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache - Real-time Feature Store (Velocity Checking)
  redis:
    image: redis:alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"

  # 3. Message Broker Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: sentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sentinel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # 4. Monitoring - Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # 5. Monitoring - Dashboard Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

networks:
  default:
    name: sentinel-network

# --- General Server Config ---
server.port=8080
spring.application.name=sentinal-backend

# --- Database (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/sentinel_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Kafka Broker Address
spring.kafka.bootstrap-servers=127.0.0.1:9092

# Producer Config (Sending to Python)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.enable.idempotence=true

# Consumer Config (Receiving from Python)
spring.kafka.consumer.group-id=sentinal-group

# 1. Tell Spring to trust the incoming JSON data
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# 2. Tell Spring to default to a Map if it doesn't know the class
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map

# 3. Use the ErrorHandlingDeserializer to prevent the "Death Loop" if a message is bad
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Custom Topic Names
app.kafka.topic.transactions=transactions
app.kafka.topic.results=fraud_results

# --- Observability & Monitoring ---
# Exposes the /actuator/prometheus endpoint for our Monitoring stack
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always

# Custom path for Swagger UI (Default is /swagger-ui.html)
springdoc.swagger-ui.path=/swagger-ui.html
# Custom path for the OpenAPI spec in JSON format
springdoc.api-docs.path=/api-docs

# Include extra details like Kafka and JVM metrics
management.metrics.tags.application=sentinal-backend
management.endpoint.prometheus.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

velocity.limit.transaction=5
velocity.limit.window.seconds=60

